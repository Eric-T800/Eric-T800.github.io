<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新日志 - Compiler IDE</title>
    <link rel="icon" href="https://eric-t800.github.io/CompilerIDE_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d4ff;
            --secondary-color: #7b2cbf;
            --accent-color: #ff6b35;
            --text-light: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: #0a0a1a;
            min-height: 100vh;
        }

        /* 星空背景 */
        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
        }

        .stars { position: absolute; width: 100%; height: 100%; }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1); }
        }

        .shooting-star {
            position: absolute;
            width: 150px; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), rgba(255,255,255,0.9));
            animation: shoot 4s ease-in-out infinite;
            opacity: 0;
            border-radius: 100px;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            right: 0; top: 50%;
            transform: translateY(-50%);
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
        }

        @keyframes shoot {
            0% { opacity: 0; transform: rotate(45deg) translateX(0); }
            2% { opacity: 1; }
            15% { opacity: 0; transform: rotate(45deg) translateX(800px); }
            100% { opacity: 0; transform: rotate(45deg) translateX(800px); }
        }

        .nebula {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 107, 53, 0.08) 0%, transparent 60%);
            animation: nebulaPulse 15s ease-in-out infinite alternate;
        }

        @keyframes nebulaPulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: floatOrb 20s ease-in-out infinite;
            opacity: 0.3;
        }

        .orb-1 { width: 300px; height: 300px; background: var(--primary-color); top: 10%; left: 10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--secondary-color); top: 60%; right: 10%; animation-delay: -5s; }
        .orb-3 { width: 250px; height: 250px; background: var(--accent-color); bottom: 20%; left: 30%; animation-delay: -10s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.9); }
            75% { transform: translate(-50px, -20px) scale(1.05); }
        }

        /* Glass 效果 */
        .glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* 页面头部 */
        .page-header {
            padding: 6rem 2rem 3rem;
            text-align: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            color: var(--text-light);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
        }

        .page-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* 更新日志容器 */
        .changelog-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .changelog-item {
            padding: 2rem;
            margin-bottom: 1.5rem;
            border-radius: 20px;
            border-left: 4px solid var(--primary-color);
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .changelog-item::before {
            content: '';
            position: absolute;
            left: -10px; top: 2rem;
            width: 16px; height: 16px;
            background: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary-color);
        }

        .changelog-item.latest {
            border-left-color: var(--accent-color);
        }

        .changelog-item.latest::before {
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .changelog-version {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .latest-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: linear-gradient(135deg, var(--accent-color), #ff8c5a);
            border-radius: 100px;
            color: white;
            -webkit-text-fill-color: white;
        }

        .changelog-item ul {
            list-style: none;
            margin-top: 1rem;
        }

        .changelog-item li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-muted);
        }

        .changelog-item li::before {
            content: '✦';
            position: absolute;
            left: 0;
            color: var(--accent-color);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
            display: block;
            color: var(--primary-color);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border-radius: 10px; }

        ::selection { background: rgba(0, 212, 255, 0.3); color: white; }

        @media (max-width: 768px) {
            .page-header { padding: 4rem 1rem 2rem; }
            .changelog-container { padding: 0 1rem 3rem; }
            .changelog-item { padding: 1.5rem; }
            .changelog-version { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="starfield">
        <div class="nebula"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
        <div class="stars" id="stars"></div>
        <div class="shooting-stars" id="shootingStars"></div>
    </div>

    <!-- 页面头部 -->
    <header class="page-header">
        <a href="https://eric-t800.github.io/" class="back-btn glass">
            <i class="fas fa-arrow-left"></i>
            <span>返回首页</span>
        </a>
        <h1 class="page-title">更新日志</h1>
        <p class="page-subtitle">Compiler IDE 的完整版本历史</p>
    </header>

    <!-- 更新日志列表 -->
    <main class="changelog-container" id="changelog-container">
        <div class="loading">
            <i class="fas fa-spinner"></i>
            <span>加载中...</span>
        </div>
    </main>

    <script>
        // 生成星空
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const shootingStarsContainer = document.getElementById('shootingStars');
            
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
            
            for (let i = 0; i < 6; i++) {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                shootingStar.style.left = Math.random() * 60 + '%';
                shootingStar.style.top = Math.random() * 40 + '%';
                shootingStar.style.animationDelay = (Math.random() * 8 + i * 2) + 's';
                shootingStar.style.animationDuration = (Math.random() * 2 + 3) + 's';
                shootingStarsContainer.appendChild(shootingStar);
            }
        }
        createStars();

        // 获取并渲染更新日志
        async function loadChangelogs() {
            const container = document.getElementById('changelog-container');
            
            try {
                const response = await fetch('https://eric-t800.github.io/changelog-data.json');
                const data = await response.json();
                
                container.innerHTML = data.changelogs.map((log, index) => `
                    <div class="changelog-item glass-card ${index === 0 ? 'latest' : ''}" style="animation-delay: ${index * 0.05}s;">
                        <div class="changelog-version">
                            v${log.version}
                            ${index === 0 ? '<span class="latest-badge">最新版本</span>' : ''}
                        </div>
                        <ul>
                            ${log.changes.map(change => `<li>${change}</li>`).join('')}
                        </ul>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('加载失败:', error);
                container.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-exclamation-triangle" style="animation: none; color: var(--accent-color);"></i>
                        <span>加载失败，请刷新页面重试</span>
                    </div>
                `;
            }
        }
        
        loadChangelogs();
    </script>
</body>
</html>
