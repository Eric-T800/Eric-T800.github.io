<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站迁移通知 | Compiler IDE</title>
    <link rel="icon" href="https://compileride.cn/CompilerIDE_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d4ff;
            --secondary-color: #7b2cbf;
            --accent-color: #ff6b35;
            --text-light: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background: #050508;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.025;
        }

        .glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .page-header {
            padding: 5rem 2rem 3rem;
            text-align: center;
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .page-title {
            font-size: clamp(3rem, 8vw, 4.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 2rem;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .redirect-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed var(--primary-color);
            transition: all 0.3s;
        }

        .redirect-link:hover {
            border-bottom-style: solid;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        #redirectMessage {
            display: inline-block;
            margin-top: 0.5rem;
        }

        .button-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.8s ease 0.8s both;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 100px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.4), 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 100px;
            color: var(--text-light);
            transition: all 0.4s;
            cursor: pointer;
        }

        .btn-outline:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
        }

        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;
            margin-top: auto;
        }

        .copyright {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); border-radius: 10px; }

        ::selection { background: rgba(0, 212, 255, 0.3); color: white; }

        @media (max-width: 768px) {
            .page-header { padding: 4rem 1rem 2rem; }
            .button-group { flex-direction: column; align-items: center; }
            .btn-primary, .btn-outline { width: 100%; max-width: 300px; justify-content: center; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header class="page-header">
        <h1 class="page-title">网站迁移通知</h1>
        <p class="page-subtitle">
            官网已更新至 <a href="https://compileride.cn" class="redirect-link" target="_blank" rel="noopener">https://compileride.cn</a><br>
            <span id="redirectMessage">将在 <strong id="countdownDisplay">3</strong> 秒后自动跳转。</span>
        </p>

        <div class="button-group">
            <a href="https://compileride.cn" class="btn-primary">
                <i class="fas fa-external-link-alt"></i> 立即跳转
            </a>
            <a href="javascript:void(0)" class="btn-outline glass" onclick="stopRedirect()">
                <i class="fas fa-hand"></i> 暂不跳转
            </a>
        </div>
    </header>

    <footer>
        <p class="copyright">&copy; 2026 Compiler IDE. All rights reserved.</p>
    </footer>

    <script>
        // 背景星空动画（完全保留）
        (function() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let W, H;
            let particles = [];
            const COLORS = ['rgba(0,229,255,', 'rgba(124,58,237,'];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.r = Math.random() * 1.5 + 0.3;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.alpha = Math.random() * 0.5 + 0.1;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    this.baseAlpha = this.alpha;
                    this.twinkleSpeed = Math.random() * 0.015 + 0.005;
                    this.twinklePhase = Math.random() * Math.PI * 2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.twinklePhase += this.twinkleSpeed;
                    this.alpha = this.baseAlpha * (0.6 + 0.4 * Math.sin(this.twinklePhase));
                    if (this.x < -5 || this.x > W + 5 || this.y < -5 || this.y > H + 5) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + this.alpha + ')';
                    ctx.fill();
                }
            }

            class Meteor {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * W * 0.7;
                    this.y = Math.random() * H * 0.4;
                    this.len = Math.random() * 120 + 80;
                    this.speed = Math.random() * 6 + 4;
                    this.alpha = 0;
                    this.active = false;
                    this.timer = Math.random() * 300;
                }
                update() {
                    if (this.timer > 0) { this.timer--; return; }
                    if (!this.active) { this.active = true; this.alpha = 0; }
                    this.x += this.speed;
                    this.y += this.speed * 0.5;
                    this.alpha = Math.min(this.alpha + 0.08, 1);
                    if (this.x > W + this.len) this.reset();
                }
                draw() {
                    if (!this.active || this.alpha === 0) return;
                    const grd = ctx.createLinearGradient(this.x - this.len, this.y - this.len * 0.5, this.x, this.y);
                    grd.addColorStop(0, 'rgba(255,255,255,0)');
                    grd.addColorStop(1, `rgba(255,255,255,${this.alpha * 0.8})`);
                    ctx.beginPath();
                    ctx.moveTo(this.x - this.len, this.y - this.len * 0.5);
                    ctx.lineTo(this.x, this.y);
                    ctx.strokeStyle = grd;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
                    ctx.fill();
                }
            }

            const blobs = [
                { x: 0.15, y: 0.3, r: 0.35, color: 'rgba(124,58,237,0.06)', phase: 0, speed: 0.0008 },
                { x: 0.8, y: 0.7, r: 0.4, color: 'rgba(0,229,255,0.05)', phase: 1.5, speed: 0.001 },
                { x: 0.5, y: 0.5, r: 0.3, color: 'rgba(244,63,94,0.04)', phase: 3, speed: 0.0007 }
            ];

            for (let i = 0; i < 180; i++) particles.push(new Particle());
            const meteors = [new Meteor(), new Meteor(), new Meteor()];

            function loop() {
                ctx.clearRect(0, 0, W, H);
                const bg = ctx.createLinearGradient(0, 0, W, H);
                bg.addColorStop(0, '#050508');
                bg.addColorStop(0.5, '#07070f');
                bg.addColorStop(1, '#050508');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, W, H);

                blobs.forEach(b => {
                    b.phase += b.speed;
                    const bx = (b.x + Math.sin(b.phase) * 0.05) * W;
                    const by = (b.y + Math.cos(b.phase * 0.7) * 0.05) * H;
                    const br = b.r * Math.min(W, H);
                    const grd = ctx.createRadialGradient(bx, by, 0, bx, by, br);
                    grd.addColorStop(0, b.color);
                    grd.addColorStop(1, 'transparent');
                    ctx.fillStyle = grd;
                    ctx.fillRect(0, 0, W, H);
                });

                particles.forEach(p => { p.update(); p.draw(); });
                meteors.forEach(m => { m.update(); m.draw(); });
                requestAnimationFrame(loop);
            }
            loop();
        })();

        // 倒计时与取消逻辑
        let seconds = 3;
        const countdownEl = document.getElementById('countdownDisplay');
        const redirectMessageEl = document.getElementById('redirectMessage');
        const redirectUrl = 'https://compileride.cn';
        let redirectTimer;

        function updateCountdown() {
            if (seconds <= 0) {
                window.location.href = redirectUrl;
                return;
            }
            countdownEl.textContent = seconds;
            seconds--;
            redirectTimer = setTimeout(updateCountdown, 1000);
        }

        function stopRedirect() {
            if (redirectTimer) {
                clearTimeout(redirectTimer);
                redirectTimer = null;
                // 优雅地修改提示文本，不再出现“已取消秒”
                redirectMessageEl.innerHTML = '自动跳转已取消，您可以手动点击下方按钮前往新官网。';
            }
        }

        // 开始倒计时
        updateCountdown();

        // 页面加载淡入
        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            requestAnimationFrame(() => { document.body.style.opacity = '1'; });
        });
    </script>
</body>
</html>
